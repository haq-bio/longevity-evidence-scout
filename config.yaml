# Longevity Evidence Scout Configuration
# Version 1.5 | March 2026
#
# CHANGES v1.5:
# - FIXED: High-risk queries that pulled inpatient/clinical medicine literature:
#     - RDW heart failure: added community/cohort qualifiers
#     - Hemoglobin anemia: restricted to community/aging cohort context
#     - NLR: added community-dwelling qualifier
#     - Albumin frailty: added community-dwelling qualifier
#     - Cytokines: tightened to inflammaging + community context
#     - "mortality" queries: added population qualifiers throughout
# - NEW: Functional medicine / integrative biomarker keyword group
# - NEW: Supplements & nutraceuticals keyword group (NAD+, NMN, omega-3, CoQ10, etc.)
# - NEW: Gut microbiome & longevity keyword group
# - NEW: Hormesis & lifestyle interventions keyword group
# - NEW: Wearable / continuous biomarker monitoring keyword group
# - CHANGED: min_score_to_save lowered from 4 to 3 (capture good smaller-journal studies)
# - CHANGED: date_after extended from 2023-01-01 to 2020-01-01 (6-year lookback)

